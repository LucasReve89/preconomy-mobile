name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["type:fix"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, environment (browser, OS, device).
